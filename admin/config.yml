backend:
  name: git-gateway
  branch: main

media_folder: "assets/img"
public_folder: "/assets/img"

collections:
  - name: "content"
    label: "Site Content"
    files:
      - label: "Settings"
        name: "settings"
        file: "content/settings.json"
        format: "json"
        fields:
          - { label: "Business Name", name: "businessName", widget: "string" }
          - { label: "Tagline", name: "tagline", widget: "string" }
          - { label: "Hero Title", name: "heroTitle", widget: "string" }
          - { label: "Hero Subtitle", name: "heroSubtitle", widget: "text" }
          - { label: "Phone", name: "phone", widget: "string" }
          - { label: "Email", name: "email", widget: "string" }
          - { label: "Address", name: "address", widget: "string" }
          - { label: "City", name: "city", widget: "string" }
          - { label: "Maps URL", name: "mapsUrl", widget: "string" }
          - { label: "Maps Embed URL", name: "mapsEmbedUrl", widget: "string" }
          - label: "Hours"
            name: "hours"
            widget: "object"
            fields:
              - { label: "Mon", name: "Mon", widget: "string" }
              - { label: "Tue", name: "Tue", widget: "string" }
              - { label: "Wed", name: "Wed", widget: "string" }
              - { label: "Thu", name: "Thu", widget: "string" }
              - { label: "Fri", name: "Fri", widget: "string" }
              - { label: "Sat", name: "Sat", widget: "string" }
              - { label: "Sun", name: "Sun", widget: "string" }

      - label: "Services"
        name: "services"
        file: "content/services.json"
        format: "json"
        fields:
          - { label: "Intro", name: "intro", widget: "text" }
          - label: "Homepage Highlights"
            name: "highlights"
            widget: "list"
            field: { label: "Highlight", name: "highlight", widget: "string" }
          - label: "Service Cards"
            name: "cards"
            widget: "list"
            fields:
              - { label: "Title", name: "title", widget: "string" }
              - { label: "Description", name: "desc", widget: "text" }
              - label: "Bullets"
                name: "items"
                widget: "list"
                field: { label: "Item", name: "item", widget: "string" }

      - label: "Gallery"
        name: "gallery"
        file: "content/gallery.json"
        format: "json"
        fields:
          - label: "Gallery Items"
            name: "items"
            widget: "list"
            fields:
              - { label: "Image", name: "image", widget: "image" }
              - { label: "Caption", name: "caption", widget: "string" }

      - label: "Reviews"
        name: "reviews"
        file: "content/reviews.json"
        format: "json"
        fields:
          - label: "Reviews"
            name: "items"
            widget: "list"
            fields:
              - { label: "Name", name: "name", widget: "string" }
              - { label: "Stars (1-5)", name: "stars", widget: "number", value_type: "int", min: 1, max: 5 }
              - { label: "Source", name: "source", widget: "string" }
              - { label: "Text", name: "text", widget: "text" }
